services:
  - type: web
    name: draw-duel-test
    runtime: python
    plan: free
    rootDir: .
    buildCommand: pip install -r requirements.txt && python3 -m py_compile draw_duel/server.py
    startCommand: python3 draw_duel/server.py
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
