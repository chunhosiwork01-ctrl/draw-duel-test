<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>王婆說媒：樓價相親問答</title>
  <style>
    :root {
      --red-1: #7d0f12;
      --red-2: #b71c1c;
      --red-3: #d94a34;
      --gold-1: #d6a64f;
      --gold-2: #f4dc9a;
      --gold-3: #fff2c7;
      --ink: #311716;
      --muted: #7d4f46;
      --paper: rgba(255, 246, 228, 0.95);
      --panel: rgba(255, 250, 240, 0.76);
      --line: rgba(125, 15, 18, 0.12);
      --shadow: 0 30px 80px rgba(86, 16, 18, 0.22);
      --good: #2f7f52;
      --bad: #9f2631;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: "Songti SC", "STSong", "Noto Serif TC", Georgia, serif;
      background:
        radial-gradient(circle at top, rgba(244, 220, 154, 0.35), transparent 30%),
        radial-gradient(circle at left, rgba(217, 74, 52, 0.18), transparent 25%),
        linear-gradient(180deg, #7a0e14 0%, #98191d 32%, #b42625 58%, #7f1114 100%);
    }

    body {
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .app {
      width: min(100%, 980px);
    }

    .frame {
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(244, 220, 154, 0.42);
      border-radius: 30px;
      background:
        linear-gradient(180deg, rgba(255, 243, 221, 0.98), rgba(255, 248, 235, 0.94)),
        var(--paper);
      box-shadow: var(--shadow);
    }

    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(244,220,154,0.28), transparent 70%);
      pointer-events: none;
    }

    .frame::before {
      top: -60px;
      left: -40px;
    }

    .frame::after {
      right: -30px;
      bottom: -60px;
    }

    .screen {
      position: relative;
      padding: 28px;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.22s ease, transform 0.22s ease;
    }

    .screen.fade {
      opacity: 0;
      transform: translateY(8px);
    }

    .eyebrow {
      color: var(--red-3);
      font-size: 12px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    h1, h2, h3, p {
      margin: 0;
    }

    h1 {
      font-size: clamp(34px, 5vw, 60px);
      line-height: 1.02;
      max-width: 8ch;
    }

    h2 {
      font-size: clamp(28px, 3vw, 42px);
      line-height: 1.14;
    }

    h3 {
      font-size: 18px;
      line-height: 1.2;
    }

    p {
      color: var(--muted);
      line-height: 1.7;
      font-size: 16px;
    }

    .hero {
      display: grid;
      gap: 18px;
    }

    .hero-layout {
      display: grid;
      grid-template-columns: 1.1fr 0.9fr;
      gap: 18px;
      align-items: stretch;
    }

    .hero-copy {
      display: grid;
      gap: 14px;
    }

    .hero-badges {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .badge {
      padding: 8px 12px;
      border-radius: 999px;
      border: 1px solid rgba(125, 15, 18, 0.1);
      background: rgba(255,255,255,0.58);
      color: var(--muted);
      font-size: 13px;
    }

    .opera {
      position: relative;
      min-height: 280px;
      border: 1px solid var(--line);
      border-radius: 24px;
      background:
        linear-gradient(180deg, rgba(183, 28, 28, 0.94), rgba(125, 15, 18, 0.98));
      overflow: hidden;
    }

    .opera::before {
      content: "";
      position: absolute;
      inset: 16px;
      border-radius: 18px;
      border: 1px solid rgba(244, 220, 154, 0.35);
      pointer-events: none;
    }

    .lantern {
      position: absolute;
      top: 22px;
      width: 50px;
      height: 64px;
      background: linear-gradient(180deg, #ffdc99, #f9af55 30%, #cc332b 75%, #8f1416 100%);
      border-radius: 26px;
      box-shadow: inset 0 -8px 12px rgba(0,0,0,0.18);
    }

    .lantern::before,
    .lantern::after {
      content: "";
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      background: var(--gold-2);
    }

    .lantern::before {
      top: -10px;
      width: 24px;
      height: 10px;
      border-radius: 8px 8px 0 0;
    }

    .lantern::after {
      bottom: -14px;
      width: 2px;
      height: 20px;
      box-shadow: 0 5px 0 0 var(--gold-2), 0 10px 0 0 var(--gold-2);
    }

    .lantern.left {
      left: 42px;
    }

    .lantern.right {
      right: 42px;
    }

    .wangpo {
      position: absolute;
      left: 50%;
      bottom: 0;
      width: 210px;
      height: 235px;
      transform: translateX(-50%);
    }

    .wangpo .head {
      position: absolute;
      top: 28px;
      left: 74px;
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: #f7c89d;
      box-shadow: inset 0 -5px 0 rgba(0,0,0,0.06);
    }

    .wangpo .hair {
      position: absolute;
      top: 14px;
      left: 60px;
      width: 92px;
      height: 62px;
      border-radius: 48px 48px 20px 20px;
      background: #2a1c1c;
    }

    .wangpo .hair::after {
      content: "";
      position: absolute;
      top: 8px;
      right: -8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: #2a1c1c;
    }

    .wangpo .body {
      position: absolute;
      left: 34px;
      bottom: 0;
      width: 142px;
      height: 160px;
      border-radius: 42px 42px 18px 18px;
      background: linear-gradient(180deg, #1f4354, #102833 68%);
    }

    .wangpo .sleeve-left,
    .wangpo .sleeve-right {
      position: absolute;
      top: 98px;
      width: 60px;
      height: 92px;
      border-radius: 26px;
      background: linear-gradient(180deg, #b73a2e, #8f1c17);
    }

    .wangpo .sleeve-left {
      left: 4px;
      transform: rotate(22deg);
    }

    .wangpo .sleeve-right {
      right: 4px;
      transform: rotate(-22deg);
    }

    .wangpo .fan {
      position: absolute;
      left: 28px;
      top: 108px;
      width: 48px;
      height: 48px;
      border-radius: 50% 50% 46% 46%;
      background: radial-gradient(circle at 40% 40%, #fff1df, #d64e3a 75%);
      border: 2px solid rgba(255,255,255,0.5);
    }

    .hero-note,
    .paper,
    .status-card,
    .option {
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 22px;
    }

    .hero-note,
    .paper {
      padding: 18px;
    }

    .hero-note ul {
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      line-height: 1.8;
    }

    .lang-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .lang-card {
      appearance: none;
      border: 1px solid var(--line);
      cursor: pointer;
      border-radius: 22px;
      background: var(--panel);
      padding: 18px;
      text-align: left;
      color: var(--ink);
      font: inherit;
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .lang-card:hover,
    .lang-card:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(183, 28, 28, 0.28);
      background: rgba(255,255,255,0.92);
      outline: none;
    }

    .lang-card strong {
      display: block;
      margin-bottom: 6px;
      font-size: 22px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 18px;
    }

    .topbar-tools {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .progress {
      flex: 1;
      height: 10px;
      border-radius: 999px;
      background: rgba(125, 15, 18, 0.08);
      overflow: hidden;
    }

    .progress span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, var(--red-2), #e5754f, var(--gold-1));
      transition: width 0.24s ease;
    }

    .progress-text {
      font-size: 14px;
      color: var(--muted);
      white-space: nowrap;
    }

    .sound-btn {
      appearance: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 12px;
      font: inherit;
      cursor: pointer;
      font-size: 13px;
      white-space: nowrap;
    }

    .dialogue {
      display: grid;
      gap: 14px;
      margin-bottom: 20px;
    }

    .speech {
      position: relative;
      padding: 18px 20px;
    }

    .speech::after {
      content: "";
      position: absolute;
      left: 24px;
      bottom: -10px;
      width: 20px;
      height: 20px;
      background: var(--panel);
      border-left: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      transform: rotate(-45deg);
    }

    .speech strong {
      display: block;
      margin-bottom: 8px;
      color: var(--red-2);
      font-size: 14px;
    }

    .status-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .status-card {
      padding: 14px;
    }

    .status-card strong {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .status-card span {
      display: block;
      font-size: 24px;
      font-weight: 700;
      line-height: 1.1;
    }

    .options {
      display: grid;
      gap: 12px;
    }

    .custom-card {
      padding: 18px;
      border-radius: 22px;
      border: 1px dashed rgba(183, 28, 28, 0.2);
      background: rgba(255,255,255,0.52);
    }

    .custom-card label {
      display: block;
      margin-bottom: 10px;
      font-weight: 700;
      color: var(--ink);
    }

    .custom-row {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .custom-input {
      flex: 1 1 220px;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
      color: var(--ink);
      background: rgba(255,255,255,0.9);
    }

    .option {
      appearance: none;
      width: 100%;
      text-align: left;
      padding: 18px;
      cursor: pointer;
      color: var(--ink);
      transition: transform 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .option:hover,
    .option:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(183, 28, 28, 0.28);
      background: rgba(255,255,255,0.92);
      outline: none;
    }

    .option-title {
      display: block;
      margin-bottom: 6px;
      font-size: 20px;
      font-weight: 700;
    }

    .option-desc {
      display: block;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
    }

    .option-impact {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(183, 28, 28, 0.08);
      color: var(--red-2);
      font-size: 12px;
      font-weight: 700;
    }

    .primary {
      appearance: none;
      border: 0;
      cursor: pointer;
      width: fit-content;
      padding: 15px 22px;
      border-radius: 999px;
      background: linear-gradient(135deg, #b71c1c, #d94a34);
      color: #fff8ef;
      font: inherit;
      font-weight: 700;
      box-shadow: 0 10px 20px rgba(183, 28, 28, 0.18);
    }

    .ghost {
      appearance: none;
      border: 1px solid var(--line);
      cursor: pointer;
      width: fit-content;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(255,255,255,0.76);
      color: var(--ink);
      font: inherit;
      font-weight: 700;
    }

    .summary {
      padding: 18px;
      border-radius: 22px;
      border: 1px solid rgba(183, 28, 28, 0.18);
      background: rgba(183, 28, 28, 0.06);
      color: #6f3029;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .list-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid var(--line);
    }

    .list-row:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .list-row span {
      color: var(--muted);
    }

    .list-row b {
      color: var(--ink);
      text-align: right;
    }

    .good {
      color: var(--good);
    }

    .bad {
      color: var(--bad);
    }

    @media (max-width: 820px) {
      .hero-layout,
      .status-grid,
      .lang-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 640px) {
      .screen {
        padding: 20px;
      }

      .topbar {
        flex-direction: column;
        align-items: stretch;
      }

      .topbar-tools {
        justify-content: space-between;
      }
    }
  </style>
</head>

      function txt() {
        return ui[language || "zh"];
      }

      function questions() {
        return questionSets[language || "zh"];
      }

      var state = {
        index: -1,
        annualIncome: 0,
        annualCost: 0,
        annualSavingBonus: 0,
        targetFlatPrice: 6200000,
        notes: [],
        choices: [],
        soundOn: false,
        audioStarted: false
      };

      var audioContext = null;
      var ambientTimer = null;

      function money(value) {
        var sign = value < 0 ? "-" : "";
        var n = Math.abs(Math.round(value));
        return sign + "HK$" + n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }

      function disposable() {
        return state.annualIncome - state.annualCost + state.annualSavingBonus;
      }

      function currentFullPrice() {
        return state.targetFlatPrice;
      }

      function yearsToTarget() {
        var available = disposable();
        if (available <= 0) return Infinity;

        var savings = 0;
        for (var year = 1; year <= 35; year += 1) {
          savings += available;
          if (savings >= state.targetFlatPrice) {
            return year;
          }
        }
        return Infinity;
      }

      function ensureAudio() {
        if (!audioContext) {
          var Ctx = window.AudioContext || window.webkitAudioContext;
          if (!Ctx) return null;
          audioContext = new Ctx();
        }
        if (audioContext.state === "suspended") {
          audioContext.resume();
        }
        return audioContext;
      }

      function playTone(freq, duration, type, volume) {
        if (!state.soundOn) return;
        var ctx = ensureAudio();
        if (!ctx) return;
        var osc = ctx.createOscillator();
        var gain = ctx.createGain();
        osc.type = type || "sine";
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(volume || 0.03, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.start();
        osc.stop(ctx.currentTime + duration);
      }

      function playSelectSound() {
        playTone(523.25, 0.18, "triangle", 0.04);
        window.setTimeout(function () {
          playTone(659.25, 0.16, "triangle", 0.03);
        }, 70);
      }

      function startAmbient() {
        if (!state.soundOn || ambientTimer) return;
        ambientTimer = window.setInterval(function () {
          playTone(392, 0.6, "sine", 0.015);
          window.setTimeout(function () {
            playTone(523.25, 0.45, "sine", 0.012);
          }, 240);
        }, 3800);
      }

      function stopAmbient() {
        if (ambientTimer) {
          window.clearInterval(ambientTimer);
          ambientTimer = null;
        }
      }

      function toggleSound() {
        state.soundOn = !state.soundOn;
        if (state.soundOn) {
          ensureAudio();
          startAmbient();
          playTone(440, 0.18, "triangle", 0.04);
        } else {
          stopAmbient();
        }
      }

      function impactText(option) {
        var t = txt();
        var parts = [];
        if (option.monthlyIncome) parts.push(t.impactIncome + money(option.monthlyIncome * 12));
        if (option.yearlyCost) parts.push(t.impactCost + money(option.yearlyCost));
        if (option.yearlySaving) parts.push(t.impactSave + money(option.yearlySaving));
        if (option.flatPrice) parts.push(t.impactPrice + money(option.flatPrice));
        return parts.join(" · ");
      }

      function customChoiceFromInput(question, value) {
        var cfg = question.customInput;
        var amount = Number(value);
        if (!isFinite(amount) || amount < 0) {
          amount = 0;
        }

        var choice = {
          title: cfg.customTitle,
          desc: cfg.customDesc,
          note: cfg.notePrefix + money(amount)
        };

        if (cfg.mode === "monthlyIncome") {
          choice.monthlyIncome = amount;
        } else if (cfg.mode === "flatPrice") {
          choice.flatPrice = amount;
        } else {
          choice.yearlyCost = amount;
        }

        return choice;
      }

              '<div class="status-card"><strong>' + t.leftLabel + '</strong><span class="' + (disposable() >= 0 ? "good" : "bad") + '">' + money(disposable()) + '</span></div>' +
            '</div>' +
            '<div class="options">' + optionHtml + (question.customInput ? (
              '<div class="custom-card">' +
                '<label for="customAmount">' + question.customInput.label + '</label>' +
                '<div class="custom-row">' +
                  '<input class="custom-input" id="customAmount" type="number" min="0" step="100" placeholder="' + question.customInput.placeholder + '">' +
                  '<button class="primary" type="button" id="customBtn">' + question.customInput.button + '</button>' +
                '</div>' +
              '</div>'
            ) : '') + '</div>' +
          '</div>';

        document.getElementById("soundToggle").addEventListener("click", function () {
          toggleSound();
          renderQuestion();
        });

        Array.prototype.forEach.call(app.querySelectorAll(".option"), function (button) {
          button.addEventListener("click", function () {
            choose(question.options[Number(button.getAttribute("data-index"))]);
          });
        });

        if (question.customInput) {
          document.getElementById("customBtn").addEventListener("click", function () {
            var raw = document.getElementById("customAmount").value;
            choose(customChoiceFromInput(question, raw));
          });
        }
      }

      function choose(option) {
        playSelectSound();
        if (option.monthlyIncome) {
          state.annualIncome = option.monthlyIncome * 12;
        }
        state.annualCost += option.yearlyCost || 0;
        state.annualSavingBonus += option.yearlySaving || 0;
        if (option.flatPrice) {
          state.targetFlatPrice = option.flatPrice;
        }
        state.notes.push(option.note);
        state.choices.push(option.title);
        state.index += 1;
        renderQuestion();
      }

      function renderResult() {
        var t = txt();
        var left = disposable();
        var years = yearsToTarget();
        var todayFullPrice = currentFullPrice();
        var title;
        var summary;

        if (left <= 0) {
          title = t.titleBad;
          summary = t.bodyBad;
        } else if (years > 12) {
          title = t.titleLong;
          summary = t.bodyLong;
        } else if (years > 6) {
          title = t.titleMid;
          summary = t.bodyMid;
        } else {
          title = t.titleGood;
          summary = t.bodyGood;
        }

        app.innerHTML =
          '<div class="screen">' +
            '<div class="dialogue">' +
              '<div class="speech paper">' +
                '<strong>' + t.resultSpeaker + '</strong>' +
                '<h2>' + title + '</h2>' +
                '<p>' + summary + '</p>' +
              '</div>' +
            '</div>' +
            '<div class="status-grid">' +
              '<div class="status-card"><strong>' + t.resultIncome + '</strong><span>' + money(state.annualIncome) + '</span></div>' +
              '<div class="status-card"><strong>' + t.resultCost + '</strong><span>' + money(state.annualCost) + '</span></div>' +
              '<div class="status-card"><strong>' + t.resultLeft + '</strong><span class="' + (left >= 0 ? "good" : "bad") + '">' + money(left) + '</span></div>' +
              '<div class="status-card"><strong>' + t.resultYears + '</strong><span class="' + (years === Infinity ? "bad" : "") + '">' + (years === Infinity ? t.resultNever : years + t.resultYearsSuffix) + '</span></div>' +
            '</div>' +
            '<div class="summary">' + t.summaryPrefix + money(todayFullPrice) + (years === Infinity ? t.summaryInfinity : t.summaryFiniteA + years + t.summaryFiniteB) + '</div>' +
            '<div class="paper" style="margin-top:18px;">' +
              '<h3 style="margin-bottom:12px;">' + t.ledgerTitle + '</h3>' +
              '<div class="list">' +
                '<div class="list-row"><span>' + t.routeLabel + '</span><b>' + state.choices.join(' / ') + '</b></div>' +
                '<div class="list-row"><span>' + t.noteLabel + '</span><b>' + state.notes.join(' / ') + '</b></div>' +
                '<div class="list-row"><span>' + t.totalLabel + '</span><b>' + t.totalText + '</b></div>' +
              '</div>' +
            '</div>' +
            '<button class="primary" type="button" id="restartBtn" style="margin-top:18px;">' + t.restart + '</button>' +
          '</div>';

        document.getElementById("restartBtn").addEventListener("click", function () {
          state.index = 0;
          state.annualIncome = 0;
          state.annualCost = 0;
          state.annualSavingBonus = 0;
          state.targetFlatPrice = 6200000;
          state.notes = [];
          state.choices = [];
          renderQuestion();
        });
      }

      renderLanguageSelect();
    }());
  </script>
</body>
</html>
