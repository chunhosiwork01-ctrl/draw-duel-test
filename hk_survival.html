<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hong Kong Housing Reality Quiz</title>
  <style>
    :root {
      --bg: #0b0f14;
      --bg-soft: #121922;
      --card: rgba(18, 25, 34, 0.9);
      --line: rgba(255, 255, 255, 0.08);
      --text: #edf2f7;
      --muted: #9aa7b7;
      --accent: #d2b172;
      --accent-strong: #f2c06c;
      --danger: #ff7f7f;
      --good: #89d7a1;
      --shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Avenir Next", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background:
        radial-gradient(circle at top, rgba(210, 177, 114, 0.16), transparent 28%),
        radial-gradient(circle at bottom right, rgba(73, 92, 122, 0.2), transparent 30%),
        linear-gradient(180deg, #081018 0%, #0b0f14 45%, #070a0f 100%);
      color: var(--text);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .shell {
      width: min(100%, 820px);
    }

    .card {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 24px;
      background: var(--card);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      padding: 28px;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,0.04), transparent 32%, transparent 68%, rgba(255,255,255,0.02));
    }

    .eyebrow {
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-size: 11px;
      color: var(--accent);
      margin-bottom: 12px;
    }

    h1, h2 {
      margin: 0;
      line-height: 1.15;
      font-weight: 700;
    }

    h1 {
      font-size: clamp(28px, 4vw, 42px);
      max-width: 10ch;
    }

    h2 {
      font-size: clamp(24px, 3vw, 34px);
      margin-bottom: 10px;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.6;
    }

    .intro {
      display: grid;
      gap: 18px;
    }

    .meta {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .tag {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--muted);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
    }

    .actions {
      margin-top: 10px;
    }

    .lang-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 8px;
    }

    .lang-btn {
      width: 100%;
      text-align: left;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .lang-btn:hover,
    .lang-btn:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(210, 177, 114, 0.5);
      background: rgba(255,255,255,0.06);
      outline: none;
    }

    .lang-btn strong {
      display: block;
      font-size: 18px;
      margin-bottom: 6px;
    }

    .small-note {
      margin-top: 14px;
      font-size: 13px;
      color: var(--muted);
    }

    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      font: inherit;
    }

    .primary-btn {
      min-width: 220px;
      padding: 15px 24px;
      border-radius: 16px;
      background: linear-gradient(135deg, var(--accent), var(--accent-strong));
      color: #17120c;
      font-weight: 700;
      transition: transform 0.18s ease, filter 0.18s ease;
    }

    .primary-btn:hover,
    .primary-btn:focus-visible {
      transform: translateY(-1px);
      filter: brightness(1.05);
      outline: none;
    }

    .screen {
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.3s ease, transform 0.3s ease;
    }

    .screen.fade-out {
      opacity: 0;
      transform: translateY(10px);
    }

    .progress-wrap {
      margin-bottom: 22px;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .progress-bar {
      height: 8px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .progress-bar span {
      display: block;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), #f7d38d);
      transition: width 0.3s ease;
    }

    .question-copy {
      margin-bottom: 22px;
    }

    .question-copy p {
      margin-top: 10px;
    }

    .options {
      display: grid;
      gap: 14px;
    }

    .option {
      width: 100%;
      text-align: left;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      padding: 18px 18px 16px;
      border-radius: 18px;
      transition: transform 0.18s ease, border-color 0.18s ease, background 0.18s ease;
    }

    .option:hover,
    .option:focus-visible {
      transform: translateY(-1px);
      border-color: rgba(210, 177, 114, 0.5);
      background: rgba(255,255,255,0.06);
      outline: none;
    }

    .option-title {
      display: block;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .option-impact {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(210, 177, 114, 0.12);
      color: #f0d6a5;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    .option-desc {
      display: block;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .hint {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
    }

    .result-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin: 22px 0;
    }

    .result-stat {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: rgba(255,255,255,0.03);
    }

    .result-stat strong {
      display: block;
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .result-stat span {
      display: block;
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 700;
    }

    .negative {
      color: var(--danger);
    }

    .positive {
      color: var(--good);
    }

    .summary {
      border: 1px solid rgba(210, 177, 114, 0.24);
      background: rgba(210, 177, 114, 0.08);
      border-radius: 18px;
      padding: 18px;
      margin: 18px 0;
      color: #f4e6ca;
    }

    .list {
      display: grid;
      gap: 10px;
      margin-top: 20px;
    }

    .list-item {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
    }

    .list-item:last-child {
      border-bottom: 0;
      padding-bottom: 0;
    }

    .list-item b {
      color: var(--text);
      font-weight: 600;
    }

    .footer-actions {
      margin-top: 22px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .ghost-btn {
      min-width: 160px;
      padding: 14px 20px;
      border-radius: 16px;
      border: 1px solid var(--line);
      color: var(--text);
      background: rgba(255,255,255,0.03);
    }

    .ghost-btn:hover,
    .ghost-btn:focus-visible {
      border-color: rgba(255, 255, 255, 0.16);
      background: rgba(255,255,255,0.06);
      outline: none;
    }

    .fallback {
      min-height: 420px;
      display: grid;
      place-items: center;
      text-align: center;
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      .card {
        border-radius: 20px;
        padding: 20px;
      }

      .result-grid {
        grid-template-columns: 1fr;
      }

      .list-item {
        flex-direction: column;
        align-items: flex-start;
      }

      .primary-btn,
      .ghost-btn {
        width: 100%;
      }

      .lang-grid {
        grid-template-columns: 1fr;
      }

      .lang-btn,
      .primary-btn,
      .ghost-btn {
        width: 100%;
      }
    }
  </style>
</head>

      function currentLang() {
        return state.language || "en";
      }

      function t() {
        return ui[currentLang()];
      }

      function currentQuestions() {
        return questionSets[currentLang()];
      }

      function escapeHtml(text) {
        return String(text)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#39;");
      }

      function money(value) {
        var rounded = Math.round(value);
        var sign = rounded < 0 ? "-" : "";
        var number = Math.abs(rounded).toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        return sign + "HK$" + number;
      }

      function compactMoney(value) {
        if (value >= 1000000) {
          return "HK$" + (value / 1000000).toFixed(value % 1000000 === 0 ? 1 : 2) + "M";
        }
        if (value >= 1000) {
          return "HK$" + Math.round(value / 100) / 10 + "K";
        }
        return money(value);
      }

      function updateUrlLanguage(lang) {
        try {
          var url = new URL(window.location.href);
          url.searchParams.set("lang", lang);
          window.history.replaceState({}, "", url.toString());
        } catch (error) {
          return;
        }
      }

      function setLanguage(lang) {
        state.language = lang;
        state.step = -1;
        state.answers = {};
        document.documentElement.lang = lang === "zh" ? "zh-Hant" : "en";
        updateUrlLanguage(lang);
      }

      function impactText(key, option) {
        var langText = t();
        if (key === "age") {
          return langText.impactSalary + money(option.salary) + langText.perMonth;
        }
        if (key === "job") {
          var pct = Math.round(option.salaryMultiplier * 100);
          return pct + "% salary, +" + money(option.expenseDelta) + langText.perMonth + langText.riskCost;
        }
        if (key === "relationship") {
          return "+" + money(option.socialDelta) + langText.perMonth + langText.socialPressure;
        }
        if (key === "flat") {
          return compactMoney(option.price) + langText.flatLabel + ", " + money(option.price * option.downPaymentRate) + langText.downPaymentLabel;
        }
        if (key === "rent" || key === "food" || key === "transport" || key === "social" || key === "familySupport" || key === "insurance") {
          return money(option.monthly) + langText.perMonth;
        }
        if (key === "randomEvent") {
          return Math.round(option.eventChance * 100) + "% risk, " + money(option.eventCost) + langText.shockLabel;
        }
        if (key === "rentGrowth") {
          return Math.round(option.rate * 100) + "%" + langText.rentIncreaseLabel;
        }
        if (key === "salaryGrowth") {
          return Math.round(option.probability * 100) + langText.chanceOf + (option.raise * 100).toFixed(1) + "% / year";
        }
        if (key === "target") {
          return option.savingsBoost > 0 ? langText.cutSpend + money(option.savingsBoost) + langText.spendSuffix : langText.noExtraCut;
        }
        return "";
      }

      function mulberry32(seed) {
        return function () {
          var tSeed = seed += 0x6D2B79F5;
          tSeed = Math.imul(tSeed ^ tSeed >>> 15, tSeed | 1);
          tSeed ^= tSeed + Math.imul(tSeed ^ tSeed >>> 7, tSeed | 61);
          return ((tSeed ^ tSeed >>> 14) >>> 0) / 4294967296;
        };
      }

      function buildSeed() {
        var raw = JSON.stringify(state.answers);
        var seed = 0;
        for (var i = 0; i < raw.length; i += 1) {
          seed = ((seed << 5) - seed + raw.charCodeAt(i)) | 0;
        }
        return Math.abs(seed) + 1;
      }

      function renderQuestion(skipAnimation) {
        var questions = currentQuestions();
        var langText = t();
        var key = questionOrder[state.step];
        var question = questions[key];
        if (!question) {
          renderResult();
          return;
        }

        var progress = ((state.step + 1) / questionOrder.length) * 100;
        var progressLeft = currentLang() === "zh"
          ? langText.progressLabel + (state.step + 1) + langText.progressJoiner + questionOrder.length
          : langText.progressLabel + (state.step + 1) + langText.progressJoiner + questionOrder.length;

        var optionsHtml = question.options.map(function (option, index) {
          var impact = impactText(key, option);
          return '' +
            '<button class="option" type="button" data-index="' + index + '">' +
              '<span class="option-title">' + escapeHtml(option.label) + '</span>' +
              '<span class="option-impact">' + escapeHtml(impact) + '</span>' +
              '<span class="option-desc">' + escapeHtml(option.desc) + '</span>' +
            '</button>';
        }).join("");

        app.innerHTML =
          '<div class="screen' + (skipAnimation ? "" : " fade-out") + '" id="screen">' +
            '<div class="progress-wrap">' +
              '<div class="progress-top">' +
                '<span>' + escapeHtml(progressLeft) + '</span>' +

              '<p>' + escapeHtml(question.subtitle) + '</p>' +
            '</div>' +
            '<div class="options">' + optionsHtml + '</div>' +
            '<div class="hint">' + escapeHtml(langText.hint) + '</div>' +
          '</div>';

        var screen = document.getElementById("screen");
        if (!skipAnimation) {
          window.requestAnimationFrame(function () {
            screen.classList.remove("fade-out");
          });
        }

        Array.prototype.forEach.call(app.querySelectorAll(".option"), function (button) {
          button.addEventListener("click", function () {
            var optionIndex = Number(button.getAttribute("data-index"));
            state.answers[key] = question.options[optionIndex];

          });

      function advance() {
        var currentScreen = document.getElementById("screen");
        if (currentScreen) {
          currentScreen.classList.add("fade-out");
        }

        window.setTimeout(function () {
          state.step += 1;
          if (state.step >= questionOrder.length) {
            renderResult();
          } else {
            renderQuestion(true);
          }
        }, 200);
      }

      function simulate() {
        var a = state.answers;
        var baseMonthlySalary = a.age.salary * a.job.salaryMultiplier;
        var monthlyRent = a.rent.monthly;
        var monthlyFood = a.food.monthly;
        var monthlyTransport = a.transport.monthly;
        var monthlySocial = a.social.monthly + a.relationship.socialDelta;
        var monthlyFamilySupport = a.familySupport.monthly;
        var monthlyInsurance = a.insurance.monthly;
        var jobInstabilityCost = a.job.expenseDelta;
        var essentialInflationRate = 0.04;
        var savingsBoost = a.target.savingsBoost;
        var downPaymentTarget = a.flat.price * a.flat.downPaymentRate;
        var years = 15;
        var rng = mulberry32(buildSeed());
        var totalSavings = 0;
        var history = [];
        var salary = baseMonthlySalary * 12;
        var baseNonHousingAnnual = (monthlyFood + monthlyTransport + monthlySocial + monthlyFamilySupport + monthlyInsurance + jobInstabilityCost) * 12;
        var rentAnnual = monthlyRent * 12;
        var rentMultiplier = 1;
        var achievedYear = null;
        var eventBurden = 0;

        for (var year = 1; year <= years; year += 1) {
          if (year > 1) {
            if (rng() < a.salaryGrowth.probability) {
              salary *= (1 + a.salaryGrowth.raise);
            } else {
              salary *= 1.01;
            }
            rentMultiplier *= (1 + a.rentGrowth.rate);
          }

          var essentialsMultiplier = Math.pow(1 + essentialInflationRate, year - 1);
          var livingCost = (baseNonHousingAnnual * essentialsMultiplier) + (rentAnnual * rentMultiplier);
          var austeritySavings = savingsBoost * 12;
          var eventCost = 0;

          if (rng() < a.randomEvent.eventChance) {
            eventCost = a.randomEvent.eventCost * (0.9 + rng() * 0.4);
            eventBurden += eventCost;
          }

          var annualNet = salary - livingCost - eventCost + austeritySavings;
          totalSavings += annualNet;

          if (achievedYear === null && totalSavings >= downPaymentTarget) {
            achievedYear = year;
          }

          history.push({
            year: year,
            salary: salary,
            livingCost: livingCost,
            eventCost: eventCost,
            annualNet: annualNet,
            savings: totalSavings
          });
        }

        var finalYear = history[history.length - 1];
        var yearsNeeded;
        if (achievedYear !== null) {
          yearsNeeded = achievedYear;
        } else {
          var averageAnnualNet = totalSavings / years;
          if (averageAnnualNet <= 0) {
            yearsNeeded = Infinity;
          } else {
            yearsNeeded = Math.ceil(downPaymentTarget / averageAnnualNet);
          }
        }

        return {
          monthlySalary: baseMonthlySalary,
          targetPrice: a.flat.price,
          downPaymentTarget: downPaymentTarget,
          finalSavings: finalYear.savings,
          finalAnnualNet: finalYear.annualNet,
          totalEventBurden: eventBurden,
          yearsNeeded: yearsNeeded,
          history: history
        };
      }

        var realistic = result.yearsNeeded === Infinity || result.yearsNeeded > 12 || result.finalSavings < result.downPaymentTarget;
        var headline = realistic ? langText.resultHeadlineBad : langText.resultHeadlineGood;
        var latest = result.history[result.history.length - 1];

              '<button class="primary-btn" type="button" id="restartQuiz">' + escapeHtml(langText.restart) + '</button>' +
              '<button class="ghost-btn" type="button" id="reviewQuiz">' + escapeHtml(langText.review) + '</button>' +
              '<button class="ghost-btn" type="button" id="changeLanguage">' + escapeHtml(langText.changeLanguage) + '</button>' +
            '</div>' +
          '</div>';

        document.getElementById("restartQuiz").addEventListener("click", function () {
          state.step = 0;
          state.answers = {};
          renderQuestion(true);
        });

        document.getElementById("reviewQuiz").addEventListener("click", function () {
          state.step = 0;
          renderQuestion(true);
        });

        document.getElementById("changeLanguage").addEventListener("click", function () {
          state.step = -1;
          state.answers = {};
          renderIntro();
        });
      }

      if (!state.language) {
        setLanguage("zh");
        state.language = "";
      } else {
        document.documentElement.lang = state.language === "zh" ? "zh-Hant" : "en";
      }

      renderIntro();
      state.ready = true;
    }());
  </script>
</body>
</html>
