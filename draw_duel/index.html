<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>多人畫畫投票對決</title>
  <style>
    :root {
      --bg: #dfe5dc;
      --panel: rgba(249, 246, 239, 0.82);
      --panel-soft: rgba(233, 228, 219, 0.84);
      --line: rgba(83, 87, 70, 0.14);
      --text: #273127;
      --muted: #697264;
      --accent: #b28762;
      --accent-2: #d0b08a;
      --good: #5d8a67;
      --bad: #b06464;
      --egg: #7a6958;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      font-family: "Avenir Next", "PingFang TC", "Hiragino Sans GB", sans-serif;
      background:
        radial-gradient(circle at top, rgba(176, 135, 98, 0.14), transparent 24%),
        linear-gradient(180deg, #e7ebe3, #d7ddd3 52%, #dce2d9);
      color: var(--text);
    }
    body {
      padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
      overscroll-behavior: none;
    }
    .app { width: min(1240px, 100%); margin: 0 auto; }
    .screen, .shell { display: grid; gap: 16px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 24px; padding: 20px; box-shadow: 0 18px 40px rgba(79, 79, 61, 0.08); backdrop-filter: blur(14px); }
    h1, h2, h3, p { margin: 0; }
    h1, h2, h3 { font-family: "Iowan Old Style", "Baskerville", "Times New Roman", "PingFang TC", serif; font-weight: 600; letter-spacing: 0.01em; }
    h1 { font-size: clamp(34px, 5vw, 58px); line-height: 1.04; }
    h2 { font-size: clamp(24px, 3vw, 42px); }
    p { color: var(--muted); line-height: 1.7; }
    .hero { display: grid; gap: 16px; grid-template-columns: 1.1fr 0.9fr; }
    .badge-row, .tool-row, .palette, .vote-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .badge { padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.35); color: var(--muted); font-size: 13px; }
    button {
      appearance: none;
      border: 0;
      cursor: pointer;
      font: inherit;
      border-radius: 14px;
    }
    .primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #241910; padding: 14px 18px; font-weight: 700; min-height: 48px; box-shadow: 0 10px 22px rgba(178, 135, 98, 0.18); }
    .ghost, .tool-btn, .vote-btn { background: var(--panel-soft); color: var(--text); border: 1px solid var(--line); padding: 14px 16px; min-height: 48px; }
    .vote-btn.like.active { background: rgba(130,214,164,0.2); border-color: rgba(130,214,164,0.5); color: var(--good); }
    .vote-btn.egg.active { background: rgba(255,139,139,0.16); border-color: rgba(255,139,139,0.45); color: var(--bad); }
    .vote-btn:disabled { cursor: default; opacity: 0.6; }
    .vote-btn.like.active { animation: pulseLike 0.9s ease-in-out infinite alternate; }
    .vote-btn.egg.active { animation: pulseEgg 0.5s ease-in-out infinite alternate; }
    .vote-icon { font-size: 22px; line-height: 1; display: inline-block; }
    .vote-btn { min-width: 72px; display: inline-flex; align-items: center; justify-content: center; }
    .input, .select {
      width: 100%;
      background: rgba(250, 248, 244, 0.95);
      color: var(--text);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      font: inherit;
      min-height: 48px;
    }
    .join-grid, .board-grid, .results-grid, .status-grid, .gallery-grid {
      display: grid;
      gap: 16px;
    }
    .join-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .board-grid, .results-grid { grid-template-columns: 1fr 1fr; }
    .status-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    .gallery-grid { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); }
    .topbar { display: flex; justify-content: space-between; gap: 14px; align-items: center; }
    .stat { background: var(--panel-soft); border: 1px solid var(--line); border-radius: 18px; padding: 14px; }
    .stat strong { display: block; margin-bottom: 6px; font-size: 12px; color: var(--muted); }
    .stat span { font-size: 24px; font-weight: 700; }
    .canvas-wrap { background: #fff; border-radius: 20px; padding: 12px; touch-action: none; }
    canvas { width: 100%; height: auto; display: block; touch-action: none; border-radius: 12px; background: #ffffff; user-select: none; }
    .palette button { width: 42px; height: 42px; border: 2px solid rgba(255,255,255,0.3); }
    .palette button.active { transform: scale(1.08); border-color: #fff; }
    .result-card img, .reference-card img, .gallery-card img {
      width: 100%;
      background: #fff;
      border-radius: 16px;
      border: 1px solid var(--line);
      display: block;
      aspect-ratio: 1 / 1;
      object-fit: contain;
    }
    .score { font-size: 34px; font-weight: 800; }
    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .egg-text { color: var(--egg); }
    .podium { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 16px; align-items: end; }
    .podium-card { text-align: center; min-height: 220px; }
    .podium-rank { font-size: 44px; font-weight: 800; }
    .podium-card.first { min-height: 290px; }
    .podium-card.second { min-height: 250px; }
    .podium-card.third { min-height: 220px; }
    .waiting { color: var(--muted); font-style: italic; }
    .toolbar-right { display: flex; gap: 10px; flex-wrap: wrap; }
    .hint { font-size: 13px; color: var(--muted); }
    .winner { border-color: rgba(130,214,164,0.45); box-shadow: inset 0 0 0 1px rgba(130,214,164,0.2); }
    .danger { color: var(--bad) !important; }
    .reconnect { color: #ffd16a; }
    @keyframes pulseLike {
      from { transform: translateY(0) scale(1); box-shadow: 0 0 0 rgba(130,214,164,0.0); }
      to { transform: translateY(-2px) scale(1.06); box-shadow: 0 0 18px rgba(130,214,164,0.35); }
    }
    @keyframes pulseEgg {
      from { transform: rotate(-6deg) scale(1); box-shadow: 0 0 0 rgba(255,139,139,0.0); }
      to { transform: rotate(6deg) scale(1.08); box-shadow: 0 0 18px rgba(255,139,139,0.32); }
    }
    a { color: #a9c9ff; }
    @media (max-width: 900px) {
      .hero, .join-grid, .board-grid, .results-grid, .status-grid, .podium { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; align-items: stretch; }
    }
    @media (max-width: 768px) {
      body { padding: 12px; }
      .card { border-radius: 20px; padding: 16px; }
      .palette button { width: 48px; height: 48px; }
    }
  </style>
</head>
<body>
  <main class="app" id="app"></main>

  <script>
    const app = document.getElementById("app");
    const state = {
      roomCode: "",
      playerId: "",
      playerName: "",
      polling: null,
      strokes: [],
      currentStroke: null,
      color: "#111111",
      size: 6,
      roomState: null,
      submitted: false,
      soundOn: true,
      audio: null,
      ambientTimer: null,
      musicStep: 0,
      roundTicker: null,
      renderKey: "",
      currentStage: "",
      lastError: "",
      consecutiveFailures: 0,
      tool: "brush",
    };

    const COLORS = ["#111111", "#ffffff", "#d62828", "#f77f00", "#fcbf49", "#2a9d8f", "#15803d", "#06d6a0", "#0ea5e9", "#1d4ed8", "#7c3aed", "#8338ec", "#ec4899", "#ff5d8f", "#8d6e63", "#9aa0a6"];
    const BRUSHES = [4, 8, 14, 22];

    function getAudioContext() {
      if (!state.audio) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return null;
        state.audio = new Ctx();
      }
      if (state.audio.state === "suspended") {
        state.audio.resume();
      }
      return state.audio;
    }

    function playTone(freq, duration, type = "triangle", volume = 0.03) {
      if (!state.soundOn) return;
      const ctx = getAudioContext();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(volume, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration);
    }

    function startAmbient() {
      if (!state.soundOn || state.ambientTimer) return;
      const motif = [
        [523.25, 0.18, "sine", 0.022],
        [659.25, 0.18, "sine", 0.02],
        [783.99, 0.22, "triangle", 0.018],
        [659.25, 0.18, "sine", 0.018],
        [587.33, 0.22, "triangle", 0.018],
        [523.25, 0.28, "sine", 0.02],
      ];
      state.ambientTimer = setInterval(() => {
        const note = motif[state.musicStep % motif.length];
        state.musicStep += 1;
        playTone(note[0], note[1], note[2], note[3]);
      }, 360);
    }

    function stopAmbient() {
      if (!state.ambientTimer) return;
      clearInterval(state.ambientTimer);
      state.ambientTimer = null;
    }

    function toggleSound() {
      state.soundOn = !state.soundOn;
      if (state.soundOn) {
        getAudioContext();
        playTone(523, 0.12, "triangle", 0.04);
        setTimeout(() => playTone(659, 0.12, "triangle", 0.03), 60);
        startAmbient();
      } else {
        stopAmbient();
      }
    }

    function clickSound() {
      playTone(440, 0.08, "triangle", 0.03);
    }

    function jsonFetch(url, options = {}) {
      return fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options,
      }).then(async (res) => {
        const data = await res.json();
        if (!res.ok || data.ok === false) {
          throw new Error(data.error || "Request failed");
        }
        return data;
      });
    }

    function getName() {
      const input = document.getElementById("playerName");
      const value = input ? input.value.trim() : "";
      return value || "匿名畫家";
    }

    function clearPoll() {
      if (!state.polling) return;
      clearInterval(state.polling);
      state.polling = null;
    }

    function clearRoundTicker() {
      if (!state.roundTicker) return;
      clearInterval(state.roundTicker);
      state.roundTicker = null;
    }

    function startPoll() {
      clearPoll();
      loadState(true);
      state.polling = setInterval(() => loadState(false), 1200);
    }

    function buildRenderKey(data) {
      return JSON.stringify({
        stage: data.stage,
        round: data.round_index,
        total_rounds: data.total_rounds,
        deadline: data.round_deadline_at,
        submitted: data.submitted,
        submissions: data.submissions,
        votes_cast: data.votes_cast,
        players: (data.players || []).map((player) => [player.id, player.wins, player.total_score]),
        result: data.round_result,
        final: data.final_winner_id,
      });
    }

    async function loadState(force = false) {
      if (!state.roomCode || !state.playerId) return;
      try {
        const data = await fetch(`/api/state?room=${encodeURIComponent(state.roomCode)}&player=${encodeURIComponent(state.playerId)}`).then((res) => res.json());
        if (data.ok === false) throw new Error(data.error || "Unable to load room");
        state.lastError = "";
        state.consecutiveFailures = 0;
        state.roomState = data;
        state.submitted = !!data.submitted;
        const nextKey = buildRenderKey(data);
        if (!force && nextKey === state.renderKey) return;
        state.renderKey = nextKey;
        state.currentStage = data.stage;

        if (data.stage === "drawing") {
          renderGame();
        } else if (data.stage === "voting") {
          renderVoting();
        } else if (data.stage === "results" || data.stage === "finished") {
          renderResults();
        } else {
          renderWaiting();
        }
      } catch (err) {
        state.consecutiveFailures += 1;
        state.lastError = err.message;
        if (!state.roomState) {
          renderLanding(err.message);
          return;
        }
        if (state.currentStage === "drawing") {
          renderGame();
        } else if (state.currentStage === "voting") {
          renderVoting();
        } else if (state.currentStage === "results" || state.currentStage === "finished") {
          renderResults();
        } else {
          renderWaiting();
        }
      }
    }

    function secondsLeft(room) {
      if (!room || !room.round_deadline_at) return null;
      return Math.max(0, Math.ceil(room.round_deadline_at - Date.now() / 1000));
    }

    function timerLabel(room) {
      const left = secondsLeft(room);
      if (left === null) return "02:00";
      const minutes = String(Math.floor(left / 60)).padStart(2, "0");
      const seconds = String(left % 60).padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function votingTimerLabel(room) {
      if (!room || !room.vote_deadline_at) return "00:30";
      const left = Math.max(0, Math.ceil(room.vote_deadline_at - Date.now() / 1000));
      const minutes = String(Math.floor(left / 60)).padStart(2, "0");
      const seconds = String(left % 60).padStart(2, "0");
      return `${minutes}:${seconds}`;
    }

    function connectionHint() {
      if (!state.lastError) return "";
      return `<p class="reconnect">連線重試中：${state.lastError}</p>`;
    }

    function renderLanding(error = "") {
      clearPoll();
      clearRoundTicker();
      state.renderKey = "";
      state.currentStage = "landing";
      app.innerHTML = `
        <div class="screen">
          <div class="hero">
            <div class="card shell">
              <p>Realtime Party Drawing</p>
              <h1>多人畫畫投票對決</h1>
              <p>同一個房間最多可有 6 位玩家。每回合大家一起畫角色，交卷後所有人對別人的作品按讚或扔雞蛋，直接由玩家投票決定高分低分，不再依賴 AI。</p>
              <div class="badge-row">
                <span class="badge">多人房間</span>
                <span class="badge">全員作畫</span>
                <span class="badge">按讚 / 扔雞蛋投票</span>
                <span class="badge">結果頁公布參考圖</span>
              </div>
              ${error ? `<p class="bad">${error}</p>` : ""}
            </div>
            <div class="card shell">
              <label>
                <p>你的名字</p>
                <input class="input" id="playerName" maxlength="24" placeholder="例如：阿明">
              </label>
              <div class="join-grid">
                <div class="card shell">
                  <h3>建立房間</h3>
                  <p>你會成為房主，等朋友一起加入。</p>
                  <button class="primary" id="createRoomBtn">建立新房間</button>
                </div>
                <div class="card shell">
                  <h3>加入房間</h3>
                  <p>輸入朋友給你的房號。</p>
                  <input class="input" id="joinCode" placeholder="房號，例如 AB12C">
                  <button class="ghost" id="joinRoomBtn">加入房間</button>
                </div>
              </div>
              <div class="tool-row">
                <button class="ghost" id="soundToggleBtn">${state.soundOn ? "音效：開" : "音效：關"}</button>
                <span class="hint">iPad 可直接用手指畫。輪詢已做穩定化，不會再每秒整頁閃動。</span>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById("createRoomBtn").onclick = async () => {
        try {
          clickSound();
          state.playerName = getName();
          const data = await jsonFetch("/api/room/create", {
            method: "POST",
            body: JSON.stringify({ name: state.playerName }),
          });
          startAmbient();
          state.roomCode = data.room_code;
          state.playerId = data.player_id;
          startPoll();
        } catch (err) {
          renderLanding(err.message);
        }
      };

      document.getElementById("joinRoomBtn").onclick = async () => {
        try {
          clickSound();
          state.playerName = getName();
          const roomCode = document.getElementById("joinCode").value.trim().toUpperCase();
          const data = await jsonFetch("/api/room/join", {
            method: "POST",
            body: JSON.stringify({ room_code: roomCode, name: state.playerName }),
          });
          startAmbient();
          state.roomCode = data.room_code;
          state.playerId = data.player_id;
          startPoll();
        } catch (err) {
          renderLanding(err.message);
        }
      };

      document.getElementById("soundToggleBtn").onclick = () => {
        toggleSound();
        renderLanding(error);
      };
    }

    function renderWaiting() {
      clearRoundTicker();
      state.currentStage = "waiting";
      const room = state.roomState;
      const isHost = room.you && room.you.is_host;
      app.innerHTML = `
        <div class="card shell">
          <div class="topbar">
            <div>
              <p>房間號</p>
              <h2>${room.room_code}</h2>
            </div>
            <div class="badge-row">
              ${room.players.map((player) => `<span class="badge">${player.name}${player.is_host ? "（房主）" : ""}</span>`).join("")}
            </div>
          </div>
          <p>${room.players.length >= 2 ? `已有 ${room.players.length} 位玩家，可開始。` : "至少需要兩位玩家才能開始。"} 房間上限 ${room.max_players} 人。</p>
          ${isHost ? `
            <label>
              <p>房主設定回合數</p>
              <select class="select" id="roundCountSelect">
                ${[3, 5, 7, 9].map((count) => `<option value="${count}" ${room.total_rounds === count ? "selected" : ""}>${count} 回合</option>`).join("")}
              </select>
            </label>
          ` : `<p class="hint">房主目前設定：${room.total_rounds} 回合</p>`}
          <div class="tool-row">
            ${room.can_start ? '<button class="primary" id="startGameBtn">開始第一回合</button>' : '<p class="waiting">等待更多玩家加入，或等房主開局。</p>'}
            <button class="ghost" id="soundToggleBtn">${state.soundOn ? "音效：開" : "音效：關"}</button>
          </div>
        </div>
      `;

      const btn = document.getElementById("startGameBtn");
      if (btn) {
        btn.onclick = async () => {
          clickSound();
          const response = await jsonFetch("/api/room/start", {
            method: "POST",
            body: JSON.stringify({ room_code: state.roomCode, player_id: state.playerId }),
          });
          state.roomState = response;
          state.strokes = [];
          state.submitted = false;
          state.renderKey = "";
          renderGame();
        };
      }
      const roundCountSelect = document.getElementById("roundCountSelect");
      if (roundCountSelect) {
        roundCountSelect.onchange = async (event) => {
          clickSound();
          const response = await jsonFetch("/api/room/config", {
            method: "POST",
            body: JSON.stringify({
              room_code: state.roomCode,
              player_id: state.playerId,
              total_rounds: Number(event.target.value),
            }),
          });
          state.roomState = response;
          state.renderKey = "";
          renderWaiting();
        };
      }
      document.getElementById("soundToggleBtn").onclick = () => {
        toggleSound();
        renderWaiting();
      };
    }

    function renderGame() {
      state.currentStage = "drawing";
      const room = state.roomState;
      const left = secondsLeft(room);
      app.innerHTML = `
        <div class="shell">
          <div class="card">
            <div class="topbar">
              <div>
                <p>房間 ${room.room_code}</p>
                <h2>第 ${room.round_index + 1} / ${room.total_rounds} 回合：畫出「${room.prompt}」</h2>
              </div>
              <div class="toolbar-right">
                <button class="ghost" id="soundToggleBtn">${state.soundOn ? "音效：開" : "音效：關"}</button>
                <div class="badge-row">
                  <span class="badge ${left !== null && left <= 10 ? "danger" : ""}" id="roundTimerBadge">倒數 ${timerLabel(room)}</span>
                  ${room.players.map((player) => `<span class="badge">${player.name} ${room.submissions[player.id] ? "已提交" : "作畫中"}</span>`).join("")}
                </div>
              </div>
            </div>
            <div class="status-grid">
              ${room.players.map((player) => `
                <div class="stat">
                  <strong>${player.name}</strong>
                  <span>${player.wins} 勝</span>
                </div>
              `).join("")}
            </div>
          </div>

          <div class="board-grid">
            <div class="card shell">
              <h3>你的畫板</h3>
              <div class="palette">${COLORS.map((color) => `<button data-color="${color}" style="background:${color}" class="${state.tool === "brush" && state.color === color ? "active" : ""}"></button>`).join("")}</div>
              <select class="select" id="brushSize">${BRUSHES.map((size) => `<option value="${size}" ${state.size === size ? "selected" : ""}>筆刷 ${size}px</option>`).join("")}</select>
              <div class="tool-row">
                <button class="ghost" id="brushToolBtn">畫筆</button>
                <button class="ghost" id="eraserToolBtn">橡皮擦</button>
                <button class="ghost" id="clearBtn">清空</button>
                <button class="primary" id="submitBtn" ${state.submitted ? "disabled" : ""}>提交本回合</button>
              </div>
              <div class="canvas-wrap">
                <canvas id="drawCanvas" width="760" height="760"></canvas>
              </div>
            </div>

            <div class="card shell">
              <h3>本回合規則</h3>
              <p>大家畫完之後，會進入全民投票。每位玩家都要對別人的作品選擇按讚或扔雞蛋，最後按全場投票直接算分。</p>
              <div class="status-grid">
                <div class="stat"><strong>你的總分</strong><span>${room.you.total_score}</span></div>
                <div class="stat"><strong>你的勝場</strong><span>${room.you.wins}</span></div>
                <div class="stat"><strong>提交狀態</strong><span>${room.submitted ? "已交卷" : "未交卷"}</span></div>
                <div class="stat"><strong>剩餘時間</strong><span class="${left !== null && left <= 10 ? "danger" : ""}" id="roundTimerStat">${timerLabel(room)}</span></div>
              </div>
              <p class="waiting">${state.submitted ? "你已提交，等待其他人交卷。" : "2 分鐘倒數中。時間到會自動交卷。橡皮擦可直接擦白色背景。"} </p>
              ${connectionHint()}
            </div>
          </div>
        </div>
      `;

      document.querySelectorAll(".palette button").forEach((btn) => {
        btn.onclick = () => {
          clickSound();
          state.tool = "brush";
          state.color = btn.dataset.color;
          state.renderKey = "";
          renderGame();
        };
      });

      document.getElementById("brushSize").onchange = (event) => {
        clickSound();
        state.size = Number(event.target.value);
      };

      document.getElementById("soundToggleBtn").onclick = () => {
        toggleSound();
        state.renderKey = "";
        renderGame();
      };

      document.getElementById("brushToolBtn").onclick = () => {
        clickSound();
        state.tool = "brush";
        state.renderKey = "";
        renderGame();
      };

      document.getElementById("eraserToolBtn").onclick = () => {
        clickSound();
        state.tool = "eraser";
        state.renderKey = "";
        renderGame();
      };

      document.getElementById("clearBtn").onclick = async () => {
        clickSound();
        state.strokes = [];
        redrawCanvas();
        await syncDrawing();
      };

      document.getElementById("submitBtn").onclick = async () => {
        clickSound();
        await submitCurrentRound();
      };
      startDrawingTicker();
      wireCanvas();
      redrawCanvas();
    }

    function renderVoting() {
      clearRoundTicker();
      state.currentStage = "voting";
      const room = state.roomState;
      const votesCast = room.votes_cast || {};
      const votedCount = Object.keys(votesCast).length;
      const requiredCount = Math.max((room.players || []).length - 1, 0);
      app.innerHTML = `
        <div class="shell">
          <div class="card">
            <div class="topbar">
              <div>
                <p>本回合題目</p>
                <h2>「${room.prompt}」全民投票</h2>
              </div>
              <div class="toolbar-right">
                <button class="ghost" id="soundToggleBtn">${state.soundOn ? "音效：開" : "音效：關"}</button>
                <div class="badge-row">
                  <span class="badge">你已投 ${votedCount} / ${requiredCount}</span>
                  <span class="badge ${room.vote_deadline_at && (room.vote_deadline_at - Date.now() / 1000) <= 10 ? "danger" : ""}">投票倒數 ${votingTimerLabel(room)}</span>
                  <span class="badge">按讚或扔雞蛋才能結算</span>
                </div>
              </div>
            </div>
            <p>現在先公布標準圖片，大家看著同一張參考圖，再對彼此作品投票。你不能投自己，但必須對其他每位玩家都投一票。</p>
            ${connectionHint()}
          </div>

          ${room.prompt_image ? `
            <div class="card reference-card shell">
              <h3>本回合標準圖片</h3>
              <p>評分前先看標準答案，避免每個人的印象差太遠。</p>
              <img src="${room.prompt_image}" alt="${room.prompt}">
            </div>
          ` : ""}

          <div class="gallery-grid">
            ${room.players.map((player) => {
              const own = player.id === room.you.id;
              const currentVote = votesCast[player.id] || "";
              return `
                <div class="card gallery-card ${own ? "winner" : ""}">
                  <h3>${player.name}${own ? "（你的作品）" : ""}</h3>
                  <img src="${room.gallery[player.id] || ""}" alt="${player.name} 的作品">
                  <div class="vote-row">
                    <button class="vote-btn like ${currentVote === "like" ? "active" : ""}" data-target="${player.id}" data-choice="like" ${own ? "disabled" : ""} title="按讚"><span class="vote-icon">👍</span></button>
                    <button class="vote-btn egg ${currentVote === "egg" ? "active" : ""}" data-target="${player.id}" data-choice="egg" ${own ? "disabled" : ""} title="扔雞蛋"><span class="vote-icon">🥚</span></button>
                  </div>
                  <p>${own ? "你不能給自己投票。" : currentVote ? `你目前投的是：${currentVote === "like" ? "按讚" : "扔雞蛋"}` : "尚未投票"}</p>
                </div>
              `;
            }).join("")}
          </div>
        </div>
      `;

      document.getElementById("soundToggleBtn").onclick = () => {
        toggleSound();
        state.renderKey = "";
        renderVoting();
      };

      document.querySelectorAll(".vote-btn").forEach((button) => {
        button.onclick = async () => {
          const targetId = button.dataset.target;
          const choice = button.dataset.choice;
          if (!targetId || !choice) return;
          clickSound();
          const response = await jsonFetch("/api/vote", {
            method: "POST",
            body: JSON.stringify({
              room_code: state.roomCode,
              player_id: state.playerId,
              target_id: targetId,
              choice,
            }),
          });
          state.roomState = response;
          state.renderKey = "";
          if (response.stage === "results" || response.stage === "finished") {
            renderResults();
          } else {
            renderVoting();
          }
        };
      });
    }

    function renderResults() {
      clearRoundTicker();
      state.currentStage = state.roomState.stage;
      const room = state.roomState;
      const result = room.round_result || { scores: {}, likes: {}, eggs: {}, roasts: {}, images: {} };
      const podium = [...(room.players || [])]
        .sort((a, b) => (b.wins - a.wins) || (b.total_score - a.total_score))
        .slice(0, 3);
      app.innerHTML = `
        <div class="shell">
          <div class="card shell">
            <div class="topbar">
              <div>
                <p>本回合題目</p>
                <h2>${room.prompt || "結束"}</h2>
              </div>
              <div class="toolbar-right">
                <button class="ghost" id="soundToggleBtn">${state.soundOn ? "音效：開" : "音效：關"}</button>
                <div class="badge-row">
                  ${room.final_winner_id ? `<span class="badge">總冠軍：${nameById(room.final_winner_id)}</span>` : ""}
                  <span class="badge">全場投票結算完成</span>
                </div>
              </div>
            </div>
            ${room.prompt_image ? `
              <div class="card reference-card shell">
                <h3>本回合參考形象</h3>
                <p>這是本回合用來投票的標準圖片，這裡保留作最後結算時再次對照。</p>
                <img src="${room.prompt_image}" alt="${room.prompt}">
                ${room.prompt_source ? `<p>${room.prompt_source}</p>` : ""}
              </div>
            ` : ""}
            ${room.stage === "finished" ? `
              <div class="card shell">
                <h3>最終頒獎台</h3>
                <div class="podium">
                  ${podium.map((player, index) => `
                    <div class="card podium-card shell ${index === 0 ? "first winner" : index === 1 ? "second" : "third"}">
                      <div class="podium-rank">${index === 0 ? "1" : index === 1 ? "2" : "3"}</div>
                      <h3>${player.name}</h3>
                      <p><strong>總分：</strong> ${player.total_score}</p>
                      <p><strong>勝場：</strong> ${player.wins}</p>
                      <p>${(player.roast_history || []).slice(-1)[0] || "今晚沒留下吐槽紀錄。"}</p>
                    </div>
                  `).join("")}
                </div>
              </div>
            ` : ""}
            <div class="results-grid">
              ${room.players.map((player) => `
                <div class="card result-card shell ${result.winner_id === player.id ? "winner" : ""}">
                  <h3>${player.name}</h3>
                  <img src="${result.images[player.id] || ""}" alt="${player.name} 的作品">
                  <div class="score ${result.winner_id === player.id ? "good" : ""}">${result.scores[player.id] ?? 0}</div>
                  <div class="badge-row">
                    <span class="badge good">讚 ${result.likes[player.id] ?? 0}</span>
                    <span class="badge egg-text">雞蛋 ${result.eggs[player.id] ?? 0}</span>
                  </div>
                  <p>${result.roasts[player.id] || "本回合沒有評語。"}</p>
                  <p><strong>總分：</strong> ${player.total_score} | <strong>勝場：</strong> ${player.wins}</p>
                </div>
              `).join("")}
            </div>
            ${room.stage === "results" && room.can_next ? '<button class="primary" id="nextRoundBtn">開始下一回合</button>' : ""}
            ${room.stage === "results" && !room.can_next ? '<p class="waiting">等待房主開始下一回合。</p>' : ""}
            ${room.stage === "finished" && room.can_restart ? '<button class="primary" id="restartRoomBtn">同房重新開始</button>' : ""}
            ${room.stage === "finished" && !room.can_restart ? '<p class="good">本局已結束，等待房主重新開始。</p>' : ""}
            ${connectionHint()}
          </div>
        </div>
      `;

      document.getElementById("soundToggleBtn").onclick = () => {
        toggleSound();
        state.renderKey = "";
        renderResults();
      };
      const btn = document.getElementById("nextRoundBtn");
      if (btn) {
        btn.onclick = async () => {
          clickSound();
          const response = await jsonFetch("/api/room/next", {
            method: "POST",
            body: JSON.stringify({ room_code: state.roomCode, player_id: state.playerId }),
          });
          state.roomState = response;
          state.strokes = [];
          state.submitted = false;
          state.renderKey = "";
          renderGame();
        };
      }
      const restartBtn = document.getElementById("restartRoomBtn");
      if (restartBtn) {
        restartBtn.onclick = async () => {
          clickSound();
          const response = await jsonFetch("/api/room/restart", {
            method: "POST",
            body: JSON.stringify({ room_code: state.roomCode, player_id: state.playerId }),
          });
          state.roomState = response;
          state.strokes = [];
          state.submitted = false;
          state.renderKey = "";
          renderWaiting();
        };
      }
    }

    function nameById(playerId) {
      const player = (state.roomState.players || []).find((item) => item.id === playerId);
      return player ? player.name : "未知玩家";
    }

    function wireCanvas() {
      const canvas = document.getElementById("drawCanvas");
      if (!canvas) return;

      function pointFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        const source = event.touches ? event.touches[0] : event;
        return {
          x: ((source.clientX - rect.left) / rect.width) * canvas.width,
          y: ((source.clientY - rect.top) / rect.height) * canvas.height,
        };
      }

      function startStroke(event) {
        if (state.submitted) return;
        event.preventDefault();
        const point = pointFromEvent(event);
        state.currentStroke = {
          color: state.tool === "eraser" ? "#ffffff" : state.color,
          size: state.size,
          points: [point],
        };
        state.strokes.push(state.currentStroke);
        redrawCanvas();
      }

      function moveStroke(event) {
        if (!state.currentStroke || state.submitted) return;
        event.preventDefault();
        state.currentStroke.points.push(pointFromEvent(event));
        redrawCanvas();
      }

      async function endStroke(event) {
        if (!state.currentStroke || state.submitted) return;
        if (event) event.preventDefault();
        state.currentStroke = null;
        await syncDrawing();
      }

      canvas.onmousedown = startStroke;
      canvas.onmousemove = moveStroke;
      canvas.onmouseup = endStroke;
      canvas.onmouseleave = endStroke;
      canvas.ontouchstart = startStroke;
      canvas.ontouchmove = moveStroke;
      canvas.ontouchend = endStroke;
      canvas.ontouchcancel = endStroke;
    }

    function redrawCanvas() {
      const canvas = document.getElementById("drawCanvas");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.lineCap = "round";
      ctx.lineJoin = "round";

      state.strokes.forEach((stroke) => {
        if (!stroke.points.length) return;
        ctx.beginPath();
        ctx.strokeStyle = stroke.color;
        ctx.lineWidth = stroke.size;
        ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
        stroke.points.slice(1).forEach((point) => ctx.lineTo(point.x, point.y));
        if (stroke.points.length === 1) {
          ctx.lineTo(stroke.points[0].x + 0.1, stroke.points[0].y + 0.1);
        }
        ctx.stroke();
      });
    }

    async function syncDrawing() {
      if (!state.roomCode || !state.playerId || state.currentStage !== "drawing") return;
      await jsonFetch("/api/draw/update", {
        method: "POST",
        body: JSON.stringify({
          room_code: state.roomCode,
          player_id: state.playerId,
          strokes: state.strokes,
        }),
      });
    }

    async function submitCurrentRound() {
      if (state.submitted || !state.roomCode || !state.playerId || state.currentStage !== "drawing") return;
      const canvas = document.getElementById("drawCanvas");
      const image = canvas ? canvas.toDataURL("image/png") : "";
      const response = await jsonFetch("/api/draw/submit", {
        method: "POST",
        body: JSON.stringify({
          room_code: state.roomCode,
          player_id: state.playerId,
          strokes: state.strokes,
          image,
        }),
      });
      state.roomState = response;
      state.submitted = true;
      state.renderKey = "";
      if (response.stage === "voting") {
        renderVoting();
      } else {
        renderGame();
      }
    }

    function startDrawingTicker() {
      clearRoundTicker();
      state.roundTicker = setInterval(async () => {
        if (state.currentStage !== "drawing" || !state.roomState) {
          clearRoundTicker();
          return;
        }
        const left = secondsLeft(state.roomState);
        if (left === null) return;
        if (left <= 0) {
          clearRoundTicker();
          if (!state.submitted) {
            try {
              await submitCurrentRound();
            } catch (err) {
              state.lastError = err.message;
              await loadState(true);
            }
          } else {
            await loadState(true);
          }
          return;
        }
        updateDrawingCountdown();
      }, 1000);
    }

    function updateDrawingCountdown() {
      if (state.currentStage !== "drawing" || !state.roomState) return;
      const left = secondsLeft(state.roomState);
      const label = timerLabel(state.roomState);
      const badge = document.getElementById("roundTimerBadge");
      const stat = document.getElementById("roundTimerStat");
      if (badge) {
        badge.textContent = `倒數 ${label}`;
        badge.classList.toggle("danger", left !== null && left <= 10);
      }
      if (stat) {
        stat.textContent = label;
        stat.classList.toggle("danger", left !== null && left <= 10);
      }
    }

    renderLanding();
  </script>
</body>
</html>
