<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>雙人畫畫對決</title>
  <style>
    :root {
      --bg: #0b1018;
      --panel: #141c28;
      --panel-soft: #1b2432;
      --line: rgba(255,255,255,0.08);
      --text: #eef4ff;
      --muted: #91a0b8;
      --accent: #f18f5c;
      --accent-2: #ffd16a;
      --good: #82d6a4;
      --bad: #ff8b8b;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; font-family: "Avenir Next", "PingFang TC", sans-serif; background:
      radial-gradient(circle at top, rgba(241,143,92,0.16), transparent 24%),
      linear-gradient(180deg, #0b1018, #111723 52%, #0b1018); color: var(--text); }
    body { padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left)); overscroll-behavior: none; }
    .app { width: min(1200px, 100%); margin: 0 auto; }
    .screen, .shell { display: grid; gap: 16px; }
    .card { background: var(--panel); border: 1px solid var(--line); border-radius: 24px; padding: 20px; }
    h1, h2, h3, p { margin: 0; }
    h1 { font-size: clamp(34px, 5vw, 58px); line-height: 1.02; }
    h2 { font-size: clamp(24px, 3vw, 36px); }
    p { color: var(--muted); line-height: 1.7; }
    .hero { display: grid; gap: 16px; grid-template-columns: 1.1fr 0.9fr; }
    .hero .card { min-height: 320px; }
    .badge-row, .tool-row, .palette { display: flex; gap: 10px; flex-wrap: wrap; }
    .badge { padding: 8px 12px; border-radius: 999px; background: rgba(255,255,255,0.06); color: var(--muted); font-size: 13px; }
    .primary, .ghost, .tool-btn, .palette button {
      appearance: none; border: 0; cursor: pointer; font: inherit; border-radius: 14px;
    }
    .primary { background: linear-gradient(135deg, var(--accent), var(--accent-2)); color: #1f1209; padding: 14px 18px; font-weight: 700; min-height: 48px; }
    .ghost, .tool-btn { background: var(--panel-soft); color: var(--text); border: 1px solid var(--line); padding: 14px 16px; min-height: 48px; }
    .input, .select {
      width: 100%; background: #0f1520; color: var(--text); border: 1px solid var(--line); border-radius: 14px; padding: 14px 14px; font: inherit; min-height: 48px;
    }
    .join-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    .topbar { display: flex; justify-content: space-between; gap: 14px; align-items: center; }
    .status-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; }
    .stat { background: var(--panel-soft); border: 1px solid var(--line); border-radius: 18px; padding: 14px; }
    .stat strong { display: block; margin-bottom: 6px; font-size: 12px; color: var(--muted); }
    .stat span { font-size: 24px; font-weight: 700; }
    .board-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .canvas-wrap { background: #fff; border-radius: 20px; padding: 12px; touch-action: none; }
    canvas { width: 100%; height: auto; display: block; touch-action: none; border-radius: 12px; background: #ffffff; -webkit-user-select: none; user-select: none; }
    .palette button { width: 42px; height: 42px; border: 2px solid rgba(255,255,255,0.3); }
    .palette button.active { transform: scale(1.08); border-color: #fff; }
    .results-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .result-card img { width: 100%; background: #fff; border-radius: 16px; border: 1px solid var(--line); }
    .reference-card img { width: 100%; background: #fff; border-radius: 16px; border: 1px solid var(--line); }
    .score { font-size: 34px; font-weight: 800; }
    .good { color: var(--good); }
    .bad { color: var(--bad); }
    .waiting { color: var(--muted); font-style: italic; }
    .toolbar-right { display: flex; gap: 10px; flex-wrap: wrap; }
    .hint { font-size: 13px; color: var(--muted); }
    @media (max-width: 900px) {
      .hero, .join-grid, .board-grid, .results-grid, .status-grid { grid-template-columns: 1fr; }
      .topbar { flex-direction: column; align-items: stretch; }
    }
    @media (max-width: 768px) {
      body { padding: 12px; }
      .card { border-radius: 20px; padding: 16px; }
      .palette button { width: 48px; height: 48px; }
      .tool-row { gap: 8px; }
    }
  </style>
</head>
<body>
  <main class="app" id="app"></main>

  <script>
    const app = document.getElementById("app");
    const state = {
      roomCode: "",
      playerId: "",
      playerName: "",
      polling: null,
      strokes: [],
      currentStroke: null,
      color: "#111111",
      size: 6,
      view: "landing",
      roomState: null,
      submitted: false,
      soundOn: false,
      audio: null,
      ambientTimer: null,
    };

    const COLORS = ["#111111", "#d62828", "#1d4ed8", "#15803d", "#f59e0b", "#7c3aed", "#ec4899", "#0ea5e9"];
    const BRUSHES = [4, 8, 14, 22];

    function getAudioContext() {
      if (!state.audio) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        if (!Ctx) return null;
        state.audio = new Ctx();
      }
      if (state.audio.state === "suspended") {
        state.audio.resume();
      }
      return state.audio;
    }

    function playTone(freq, duration, type = "triangle", volume = 0.03) {
      if (!state.soundOn) return;
      const ctx = getAudioContext();
      if (!ctx) return;
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(volume, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + duration);
      osc.connect(gain);
      gain.connect(ctx.destination);
      osc.start();
      osc.stop(ctx.currentTime + duration);
    }

    function startAmbient() {
      if (!state.soundOn || state.ambientTimer) return;
      state.ambientTimer = setInterval(() => {
        playTone(294, 0.5, "sine", 0.012);
        setTimeout(() => playTone(392, 0.45, "sine", 0.01), 220);
      }, 4200);
    }

    function stopAmbient() {
      if (state.ambientTimer) {
        clearInterval(state.ambientTimer);
        state.ambientTimer = null;
      }
    }

    function toggleSound() {
      state.soundOn = !state.soundOn;
      if (state.soundOn) {
        getAudioContext();
        playTone(523.25, 0.16, "triangle", 0.04);
        setTimeout(() => playTone(659.25, 0.14, "triangle", 0.03), 60);
        startAmbient();
      } else {
        stopAmbient();
      }
    }

    function clickSound() {
      playTone(440, 0.08, "triangle", 0.03);
    }

    function jsonFetch(url, options = {}) {
      return fetch(url, {
        headers: { "Content-Type": "application/json" },
        ...options,
      }).then(async (res) => {
        const data = await res.json();
        if (!res.ok || data.ok === false) {
          throw new Error(data.error || "Request failed");
        }
        return data;
      });
    }

    function renderLanding(error = "") {
      clearPoll();
      state.view = "landing";
      app.innerHTML = `
        <div class="screen">
          <div class="hero">
            <div class="card shell">
              <p>Realtime Drawing Duel</p>
              <h1>雙人畫畫連線對決</h1>
              <p>兩位玩家進同一個房間，由裁判出題。你們要憑記憶把角色畫出來，AI 會同時做兩件事：評相似度，順便吐槽畫得像不像怪物。</p>
              <div class="badge-row">
                <span class="badge">雙人房間制</span>
                <span class="badge">共同回合題目</span>
                <span class="badge">AI 評分 + 吐槽</span>
                <span class="badge">iPad 觸控支援</span>
              </div>
              ${error ? `<p class="bad">${error}</p>` : ""}
            </div>
            <div class="card shell">
              <label>
                <p>你的名字</p>
                <input class="input" id="playerName" maxlength="24" placeholder="例如：阿明">
              </label>
              <div class="join-grid">
                <div class="card shell" style="background:#101722;">
                  <h3>建立房間</h3>
                  <p>你會成為房主，等另一位玩家加入。</p>
                  <button class="primary" id="createRoomBtn">建立新房間</button>
                </div>
                <div class="card shell" style="background:#101722;">
                  <h3>加入房間</h3>
                  <p>輸入房號，進入朋友的遊戲房。</p>
                  <input class="input" id="joinCode" placeholder="房號，例如 AB12C">
                  <button class="ghost" id="joinRoomBtn">加入房間</button>
                </div>
              </div>
              <div class="tool-row">
                <button class="ghost" id="soundToggleBtn">${state.soundOn ? "音效：開" : "音效：關"}</button>
                <span class="hint">iPad 建議用 Safari 或 Chrome 全螢幕橫向操作。</span>
              </div>
            </div>
          </div>
        </div>
      `;

      document.getElementById("createRoomBtn").onclick = async () => {
        try {
          clickSound();
          state.playerName = getName();
          const data = await jsonFetch("/api/room/create", {
            method: "POST",
            body: JSON.stringify({ name: state.playerName }),
          });
          state.roomCode = data.room_code;
          state.playerId = data.player_id;
          startPoll();
        } catch (err) {
          renderLanding(err.message);
        }
      };

      document.getElementById("joinRoomBtn").onclick = async () => {
        try {
          clickSound();
          state.playerName = getName();
          const roomCode = document.getElementById("joinCode").value.trim().toUpperCase();
          const data = await jsonFetch("/api/room/join", {
            method: "POST",
            body: JSON.stringify({ room_code: roomCode, name: state.playerName }),
          });
          state.roomCode = data.room_code;
          state.playerId = data.player_id;
          startPoll();
        } catch (err) {
          renderLanding(err.message);
        }
      };

      document.getElementById("soundToggleBtn").onclick = () => {
        toggleSound();
        renderLanding(error);
      };
    }

    function getName() {
      const input = document.getElementById("playerName");
      const value = input.value.trim();
      return value || "匿名畫家";
    }

    function clearPoll() {
      if (state.polling) {
        clearInterval(state.polling);
        state.polling = null;
      }
    }

    function startPoll() {
      clearPoll();
      loadState();
      state.polling = setInterval(loadState, 900);
    }

    async function loadState() {
      if (!state.roomCode || !state.playerId) return;
      try {
        const data = await fetch(`/api/state?room=${encodeURIComponent(state.roomCode)}&player=${encodeURIComponent(state.playerId)}`).then(r => r.json());
        if (data.ok === false) throw new Error(data.error || "Unable to load room");
        state.roomState = data;
        if (data.stage === "drawing") {
          state.submitted = data.submitted;
          renderGame();
        } else if (data.stage === "results" || data.stage === "finished") {
          renderResults();
        } else {
          renderWaiting();
        }
      } catch (err) {
        renderLanding(err.message);
      }
    }

    function renderWaiting() {
      const room = state.roomState;
      const isHost = room.you && room.you.is_host;
      app.innerHTML = `
        <div class="card shell">
          <div class="topbar">
            <div>
              <p>房間號</p>
              <h2>${room.room_code}</h2>
            </div>
            <div class="badge-row">
              ${room.players.map(player => `<span class="badge">${player.name}${player.is_host ? "（房主）" : ""}</span>`).join("")}
            </div>
          </div>
          <p>${room.room_full ? "兩位玩家都到齊了，可以開始。" : "等待另一位玩家加入房間。"}</p>
          <div class="tool-row">
            ${room.can_start ? '<button class="primary" id="startGameBtn">開始第一回合</button>' : '<p class="waiting">請把房號分享給另一位玩家。</p>'}
            <button class="ghost" id="soundToggleBtn">${state.soundOn ? "音效：開" : "音效：關"}</button>
          </div>
        </div>
      `;
      const btn = document.getElementById("startGameBtn");
      if (btn) {
        btn.onclick = async () => {
          clickSound();
          await jsonFetch("/api/room/start", {
            method: "POST",
            body: JSON.stringify({ room_code: state.roomCode, player_id: state.playerId }),
          });
          state.strokes = [];
          state.submitted = false;
          loadState();
        };
      }
      document.getElementById("soundToggleBtn").onclick = () => {
        toggleSound();
        renderWaiting();
      };
    }

    function renderGame() {
      const room = state.roomState;
      app.innerHTML = `
        <div class="shell">
          <div class="card">
            <div class="topbar">
              <div>
                <p>房間 ${room.room_code}</p>
                <h2>第 ${room.round_index + 1} / ${room.total_rounds} 回合：畫出「${room.prompt}」</h2>
              </div>
              <div class="toolbar-right">
                <button class="ghost" id="soundToggleBtn">${state.soundOn ? "音效：開" : "音效：關"}</button>
                <div class="badge-row">
                  ${room.players.map(player => `<span class="badge">${player.name} ${room.submissions[player.id] ? "已提交" : "作畫中"}</span>`).join("")}
                </div>
              </div>
            </div>
            <div class="status-grid">
              ${room.players.map(player => `
                <div class="stat">
                  <strong>${player.name}</strong>
                  <span>${player.wins} 勝</span>
                </div>
              `).join("")}
            </div>
          </div>
          <div class="board-grid">
            <div class="card shell">
              <h3>你的畫板</h3>
              <div class="tool-row">
                <div class="palette">${COLORS.map(color => `<button data-color="${color}" style="background:${color}" class="${state.color === color ? "active" : ""}"></button>`).join("")}</div>
                <select class="select" id="brushSize">${BRUSHES.map(size => `<option value="${size}" ${size === state.size ? "selected" : ""}>筆刷 ${size}px</option>`).join("")}</select>
                <button class="tool-btn" id="clearBtn">清空</button>
                <button class="primary" id="submitBtn" ${state.submitted ? "disabled" : ""}>提交本回合</button>
              </div>
              <div class="canvas-wrap">
                <canvas id="drawCanvas" width="720" height="520"></canvas>
              </div>
              <p>${state.submitted ? "你已提交，等待另一位玩家。" : "請在畫板上直接作畫，系統會自動同步你的筆劃。"} </p>
              <p class="hint">iPad 提示：用手指或 Apple Pencil 都可以畫，畫畫時頁面不會捲動。</p>
            </div>
            <div class="card shell">
              <h3>AI 裁判規則</h3>
              <p>AI 會看你畫得像不像題目角色，同時也會吐槽畫風。若沒有設定 API key，系統會改用本地 fallback 評分。</p>
              <div class="status-grid">
                <div class="stat"><strong>你的總分</strong><span>${room.you.total_score}</span></div>
                <div class="stat"><strong>你的勝場</strong><span>${room.you.wins}</span></div>
                <div class="stat"><strong>提交狀態</strong><span>${room.submitted ? "已交卷" : "未交卷"}</span></div>
                <div class="stat"><strong>同步方式</strong><span>輪詢</span></div>
              </div>
              <p>提示：畫出最有辨識度的外輪廓和代表色，不用追求藝術，只要讓 AI 一眼看出來像誰。</p>
            </div>
          </div>
        </div>
      `;

      wireCanvas();
      redrawCanvas();

      document.querySelectorAll(".palette button").forEach(btn => {
        btn.onclick = () => {
          clickSound();
          state.color = btn.dataset.color;
          renderGame();
        };
      });

      document.getElementById("soundToggleBtn").onclick = () => {
        toggleSound();
        renderGame();
      };

      document.getElementById("brushSize").onchange = (e) => {
        clickSound();
        state.size = Number(e.target.value);
      };

      document.getElementById("clearBtn").onclick = async () => {
        clickSound();
        state.strokes = [];
        redrawCanvas();
        await syncDrawing();
      };

      document.getElementById("submitBtn").onclick = async () => {
        if (state.submitted) return;
        clickSound();
        const canvas = document.getElementById("drawCanvas");
        const image = canvas.toDataURL("image/png");
        await jsonFetch("/api/draw/submit", {
          method: "POST",
          body: JSON.stringify({
            room_code: state.roomCode,
            player_id: state.playerId,
            strokes: state.strokes,
            image,
          }),
        });
        state.submitted = true;
        loadState();
      };
    }

    function wireCanvas() {
      const canvas = document.getElementById("drawCanvas");
      const ctx = canvas.getContext("2d");

      function pointFromEvent(event) {
        const rect = canvas.getBoundingClientRect();
        const source = event.touches ? event.touches[0] : event;
        return {
          x: ((source.clientX - rect.left) / rect.width) * canvas.width,
          y: ((source.clientY - rect.top) / rect.height) * canvas.height,
        };
      }

      function startStroke(event) {
        if (state.submitted) return;
        event.preventDefault();
        if (event.cancelable) event.stopPropagation();
        const point = pointFromEvent(event);
        state.currentStroke = {
          color: state.color,
          size: state.size,
          points: [point],
        };
        state.strokes.push(state.currentStroke);
        redrawCanvas();
      }

      function moveStroke(event) {
        if (!state.currentStroke || state.submitted) return;
        event.preventDefault();
        if (event.cancelable) event.stopPropagation();
        state.currentStroke.points.push(pointFromEvent(event));
        redrawCanvas();
      }

      async function endStroke() {
        if (!state.currentStroke) return;
        state.currentStroke = null;
        await syncDrawing();
      }

      canvas.onmousedown = startStroke;
      canvas.onmousemove = moveStroke;
      window.onmouseup = endStroke;
      canvas.ontouchstart = startStroke;
      canvas.ontouchmove = moveStroke;
      canvas.ontouchend = endStroke;
      canvas.ontouchcancel = endStroke;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
    }

    function redrawCanvas() {
      const canvas = document.getElementById("drawCanvas");
      if (!canvas) return;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      state.strokes.forEach(stroke => {
        if (!stroke.points.length) return;
        ctx.beginPath();
        ctx.strokeStyle = stroke.color;
        ctx.lineWidth = stroke.size;
        ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
        stroke.points.slice(1).forEach(point => ctx.lineTo(point.x, point.y));
        if (stroke.points.length === 1) {
          ctx.lineTo(stroke.points[0].x + 0.1, stroke.points[0].y + 0.1);
        }
        ctx.stroke();
      });
    }

    async function syncDrawing() {
      if (!state.roomCode || !state.playerId) return;
      await jsonFetch("/api/draw/update", {
        method: "POST",
        body: JSON.stringify({
          room_code: state.roomCode,
          player_id: state.playerId,
          strokes: state.strokes,
        }),
      });
    }

    function renderResults() {
      const room = state.roomState;
      const result = room.round_result || { scores: {}, roasts: {}, images: {} };
      const finalWinnerId = room.final_winner_id;
      app.innerHTML = `
        <div class="shell">
          <div class="card shell">
            <div class="topbar">
              <div>
                <p>本回合題目</p>
                <h2>${room.prompt || "結束"}</h2>
              </div>
              <div class="toolbar-right">
                <button class="ghost" id="soundToggleBtn">${state.soundOn ? "音效：開" : "音效：關"}</button>
                <div class="badge-row">
                  <span class="badge">評分模式：${result.judge_mode || "fallback"}</span>
                  ${finalWinnerId ? `<span class="badge">總冠軍：${nameById(finalWinnerId)}</span>` : ""}
                </div>
              </div>
            </div>
            ${room.prompt_image ? `
              <div class="card reference-card shell" style="background:#101722;">
                <h3>裁判公布標準形象</h3>
                <p>這是本回合的角色參考圖，方便大家對照 AI 評分結果。</p>
                <img src="${room.prompt_image}" alt="${room.prompt}">
              </div>
            ` : `
              <div class="card shell" style="background:#101722;">
                <h3>裁判公布標準形象</h3>
                <p>目前還沒有放入這個角色的參考圖。你可以把對應圖片放到 <code>draw_duel/assets/</code> 之後再重開測試。</p>
              </div>
            `}
            <div class="results-grid">
              ${room.players.map(player => `
                <div class="card result-card shell">
                  <h3>${player.name}</h3>
                  <img src="${result.images[player.id] || ""}" alt="drawing">
                  <div class="score ${result.winner_id === player.id ? "good" : ""}">${result.scores[player.id] ?? 0}</div>
                  <p>${result.roasts[player.id] || "AI 裁判還沒開口。"}</p>
                  <p><strong>總分：</strong> ${player.total_score} | <strong>勝場：</strong> ${player.wins}</p>
                </div>
              `).join("")}
            </div>
            ${room.stage === "results" && room.can_next ? '<button class="primary" id="nextRoundBtn">開始下一回合</button>' : ""}
            ${room.stage === "results" && !room.can_next ? '<p class="waiting">等待房主開始下一回合。</p>' : ""}
            ${room.stage === "finished" ? '<p class="good">遊戲結束。房主可重開新房間再玩一局。</p>' : ""}
          </div>
        </div>
      `;
      const btn = document.getElementById("nextRoundBtn");
      document.getElementById("soundToggleBtn").onclick = () => {
        toggleSound();
        renderResults();
      };
      if (btn) {
        btn.onclick = async () => {
          clickSound();
          await jsonFetch("/api/room/next", {
            method: "POST",
            body: JSON.stringify({ room_code: state.roomCode, player_id: state.playerId }),
          });
          state.strokes = [];
          state.submitted = false;
          loadState();
        };
      }
    }

    function nameById(playerId) {
      const player = (state.roomState?.players || []).find(item => item.id === playerId);
      return player ? player.name : "Unknown";
    }

    window.addEventListener("touchmove", (event) => {
      if (event.target.tagName !== "CANVAS" && event.target.closest(".canvas-wrap")) {
        event.preventDefault();
      }
    }, { passive: false });

    renderLanding();
  </script>
</body>
</html>
